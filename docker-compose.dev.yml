version: '3.8'

services:
  db:
    image: mysql:8.1
    container_name: algafood-db-dev
    environment:
      MYSQL_DATABASE: algafood
      MYSQL_ROOT_PASSWORD: yasmin
    ports:
      - 3306:3306
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: algafood-api:dev
    ports:
      - 8080:8080
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/algafood?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: yasmin
    volumes:
      - .:/workspace/app
      - ~/.m2:/root/.m2
    depends_on:
      db:
        condition: service_healthy
    command: ["./mvnw", "spring-boot:run", "-Dspring-boot.run.jvmArguments=-Xdebug -Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=*:5005"]
    restart: unless-stopped

volumes:
  db_data:
